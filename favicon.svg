<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#06080f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2f4fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Gradient border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.25" stroke="url(#ring)" stroke-width="1.5" opacity="0.7"/>
  <!-- Prompt symbol ">" -->
  <path d="M6 12 L10.5 16 L6 20" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- "S" lettermark -->
  <text x="19.5" y="21.5" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="13.5" fill="url(#txt)" text-anchor="middle" letter-spacing="-0.5">S</text>
</svg>
