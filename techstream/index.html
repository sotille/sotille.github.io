<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStream — Notícias de IA e Tecnologia</title>
  <meta name="description" content="Curadoria diária de notícias relevantes de IA e tecnologia. Atualizado automaticamente." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="logo-text">TechStream</span>
      </a>
      <span class="header-badge">Daily AI &amp; Tech</span>
    </div>
  </header>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">
        <span class="live-dot"></span>
        Atualizado diariamente
      </div>
      <h1 class="hero-title">Notícias de <span class="gradient-text">IA &amp; Tecnologia</span></h1>
      <p class="hero-sub">Curadoria diária de tendências, lançamentos e destaques do mundo tech — sem ruído, só o que importa.</p>
    </div>
  </div>

  <main>
    <div class="section-header">
      <span class="section-title">Últimas notícias</span>
      <div class="section-line"></div>
      <span class="section-count" id="news-count"></span>
    </div>
    <div id="news-list"></div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-logo-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="footer-logo-text">TechStream</span>
      </div>
      <span class="footer-text">Atualizado automaticamente 1× ao dia · Curadoria de IA &amp; Tech</span>
    </div>
  </footer>

  <script type="module" src="./assets/app.js"></script>
</body>
</html>
